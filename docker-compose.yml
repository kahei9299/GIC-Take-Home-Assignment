services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafe_manager
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafe_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: gic-take-home-backend
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cafe_manager
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:4173
      FRONTEND_URL: http://localhost:4173
      DATABASE_CONNECT_TIMEOUT_SECONDS: 5
      DATABASE_POOL_TIMEOUT_SECONDS: 5
      DATABASE_POOL_RECYCLE_SECONDS: 1800
      DATABASE_POOL_SIZE: 5
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_STATEMENT_TIMEOUT_MS: 5000
      CACHE_TTL_SECONDS: 60
      REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS: 0.5
      REDIS_SOCKET_TIMEOUT_SECONDS: 0.5
      REDIS_RETRY_MAX_ATTEMPTS: 3
      REDIS_RETRY_BASE_DELAY_MS: 50
      REDIS_RETRY_MAX_DELAY_MS: 500
      READINESS_CHECK_TIMEOUT_SECONDS: 1.0
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').status == 200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
