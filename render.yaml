services:
  - type: web
    name: gic-take-home-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health/ready
    envVars:
      - key: APP_NAME
        value: gic-take-home-backend
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gic-take-home-postgres
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: "5"
      - key: DATABASE_POOL_TIMEOUT_SECONDS
        value: "5"
      - key: DATABASE_POOL_RECYCLE_SECONDS
        value: "1800"
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: "5000"
      - key: CACHE_TTL_SECONDS
        value: "60"
      - key: REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS
        value: "0.5"
      - key: REDIS_SOCKET_TIMEOUT_SECONDS
        value: "0.5"
      - key: REDIS_RETRY_MAX_ATTEMPTS
        value: "3"
      - key: REDIS_RETRY_BASE_DELAY_MS
        value: "50"
      - key: REDIS_RETRY_MAX_DELAY_MS
        value: "500"
      - key: READINESS_CHECK_TIMEOUT_SECONDS
        value: "1.0"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json

databases:
  - name: gic-take-home-postgres
    databaseName: cafe_manager
    plan: free
    region: singapore
    postgresMajorVersion: "18"
